<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>رصيد الإجازات</title>
  <style>
    body {
      font-family: Tahoma, Arial, sans-serif;
      background-color: #f4f6f9;
      text-align: center;
      direction: rtl;
    }
    header {
      background-color: #004080;
      color: white;
      padding: 15px;
    }
    header img {
      height: 50px;
      vertical-align: middle;
      margin-left: 10px;
    }
    table {
      margin: 30px auto;
      border-collapse: collapse;
      width: 70%;
      background-color: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    th, td {
      border: 1px solid #ddd;
      padding: 12px;
    }
    th {
      background-color: #004080;
      color: white;
    }
    tr:nth-child(even) {
      background-color: #f2f2f2;
    }
    tr:hover {
      background-color: #d9edf7;
    }
    input {
      padding: 8px;
      margin-top: 20px;
      width: 200px;
    }
    button {
      padding: 8px 15px;
      background-color: #004080;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #0066cc;
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="شعار الشركة">
    <span>نظام رصيد الإجازات</span>
  </header>

  <h2>أدخل رقمك الوظيفي</h2>
  <input type="text" id="empId" placeholder="رقم الموظف">
  <button onclick="searchEmployee()">بحث</button>

  <table id="resultTable" style="display:none;">
    <thead>
      <tr>
        <th>الاسم</th>
        <th>الرصيد المستنفذ</th>
        <th>الرصيد المتبقي</th>
      </tr>
    </thead>
    <tbody id="resultBody"></tbody>
  </table>

  <script>
    async function searchEmployee() {
      const empId = document.getElementById("empId").value.trim();
      const url = "لينك_CSV_من_Google_Sheets"; // ضع هنا لينك الشيت

      const response = await fetch(url);
      const data = await response.text();
      const rows = data.split("\n").map(r => r.split(","));

      const found = rows.find(r => r[1] === empId); // العمود B فيه الرقم الوظيفي
      if (found) {
        document.getElementById("resultTable").style.display = "table";
        document.getElementById("resultBody").innerHTML = `
          <tr>
            <td>${found[0]}</td>
            <td>${found[2]}</td>
            <td>${found[3]}</td>
          </tr>
        `;
      } else {
        alert("لم يتم العثور على الموظف");
      }
    }
  </script>
</body>
</html>
